<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Family Tree — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080612;
    --surface: #100d1f;
    --card: #17132b;
    --border: #2e2850;
    --accent: #b57bee;
    --accent2: #f06292;
    --text: #e8e0f8;
    --muted: #7a6fa0;
    --shadow: 0 24px 60px rgba(0,0,0,0.7);
  }

  html, body {
    height: 100%;
    font-family: 'Lato', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }

  /* ── ANIMATED BACKGROUND ── */
  .bg-stars {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    animation: twinkle var(--d, 4s) ease-in-out infinite;
    opacity: 0;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0; transform: scale(0.8); }
    50%      { opacity: var(--o, 0.6); transform: scale(1); }
  }

  /* floating orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    animation: drift linear infinite;
  }
  .orb1 { width: 500px; height: 500px; background: #4c1d9520; top: -100px; left: -100px; animation-duration: 20s; }
  .orb2 { width: 400px; height: 400px; background: #be185d18; bottom: -80px; right: -80px; animation-duration: 25s; animation-delay: -8s; }
  .orb3 { width: 300px; height: 300px; background: #1e40af15; top: 50%; left: 50%; transform: translate(-50%,-50%); animation-duration: 18s; animation-delay: -4s; }
  @keyframes drift {
    0%,100% { transform: translate(0,0) scale(1); }
    33%      { transform: translate(30px,-20px) scale(1.05); }
    66%      { transform: translate(-20px,30px) scale(0.95); }
  }

  /* ── LAYOUT ── */
  .page {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .login-card {
    background: linear-gradient(145deg, #17132bcc, #100d1fcc);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 48px 44px;
    width: 100%;
    max-width: 420px;
    backdrop-filter: blur(20px);
    box-shadow: var(--shadow), 0 0 0 1px #ffffff08 inset;
    animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo-area {
    text-align: center;
    margin-bottom: 36px;
  }
  .tree-icon {
    font-size: 3rem;
    display: block;
    margin-bottom: 12px;
    filter: drop-shadow(0 0 20px #b57bee80);
    animation: iconFloat 3s ease-in-out infinite;
  }
  @keyframes iconFloat {
    0%,100% { transform: translateY(0); }
    50%     { transform: translateY(-6px); }
  }
  .logo-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.9rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.5px;
    line-height: 1.1;
  }
  .logo-subtitle {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* ── FORM ── */
  .form-group {
    margin-bottom: 18px;
  }
  .form-group label {
    display: block;
    font-size: 0.72rem;
    color: var(--muted);
    margin-bottom: 7px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .input-wrap {
    position: relative;
  }
  .input-wrap .icon {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    font-size: 0.9rem;
    color: var(--muted);
    pointer-events: none;
  }
  .form-group input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 14px 12px 40px;
    border-radius: 10px;
    font-size: 0.9rem;
    font-family: 'Lato', sans-serif;
    outline: none;
    transition: border-color .2s, box-shadow .2s, background .2s;
  }
  .form-group input:focus {
    border-color: var(--accent);
    background: rgba(181,123,238,0.06);
    box-shadow: 0 0 0 3px rgba(181,123,238,0.12);
  }
  .form-group input::placeholder { color: #3d3560; }

  /* ── BUTTON ── */
  .login-btn {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, #7c3aed, #c084fc, #f472b6);
    background-size: 200% 200%;
    animation: gradShift 4s ease infinite;
    border: none;
    border-radius: 10px;
    color: #fff;
    font-size: 0.95rem;
    font-weight: 700;
    font-family: 'Lato', sans-serif;
    letter-spacing: 1px;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity .2s, transform .1s;
    position: relative;
    overflow: hidden;
  }
  @keyframes gradShift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  .login-btn:hover   { opacity: 0.9; transform: translateY(-1px); }
  .login-btn:active  { transform: translateY(1px); }
  .login-btn.loading { pointer-events: none; opacity: 0.7; }
  .login-btn .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── ERROR ── */
  .error-msg {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    color: #fca5a5;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 0.8rem;
    margin-top: 14px;
    display: none;
    animation: shake 0.3s ease;
  }
  .error-msg.show { display: block; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25%     { transform: translateX(-6px); }
    75%     { transform: translateX(6px); }
  }


  /* ── MOBILE ── */
  @media (max-width: 480px) {
    .login-card { padding: 36px 24px; border-radius: 18px; }
    .logo-title  { font-size: 1.6rem; }
    .tree-icon   { font-size: 2.6rem; }
  }

  /* ── FOOTER ── */
  .card-footer {
    text-align: center;
    margin-top: 28px;
    font-size: 0.7rem;
    color: #3d3560;
    letter-spacing: 1px;
  }
  .card-footer span {
    color: var(--accent2);
  }

  /* ── DIVIDER ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 24px 0;
    color: var(--muted);
    font-size: 0.7rem;
    letter-spacing: 1px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
</style>
</head>
<body>

<!-- Background -->
<div class="bg-stars" id="stars"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="page">
  <div class="login-card">
    <div class="logo-area">
      <span class="tree-icon">🌳</span>
      <div class="logo-title">Family Tree</div>
      <div class="logo-subtitle">Your family's living legacy</div>
    </div>

    <div class="form-group">
      <label>Email address</label>
      <div class="input-wrap">
        <span class="icon">✉️</span>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
      </div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <span class="icon">🔒</span>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
      </div>
    </div>

    <button class="login-btn" id="login-btn" onclick="doLogin()">
      Sign In
    </button>

    <div class="error-msg" id="error-msg"></div>

    <div class="card-footer">
      Protected family space · <span>❤</span> built with care
    </div>
  </div>
</div>

<!-- ════ FIREBASE ════ -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// ── PASTE YOUR CONFIG HERE ──────────────────────────
const firebaseConfig = {
  apiKey:            "AIzaSyCo3tfrTjggIuLvt7oigI6ly_qHYGQlcsY",
  authDomain:        "family-tree-cafc6.firebaseapp.com",
  projectId:         "family-tree-cafc6",
  storageBucket:     "family-tree-cafc6.firebasestorage.app",
  messagingSenderId: "105629851742",
  appId:             "1:105629851742:web:c00a5719d0bc230ed694cf",
  measurementId:     "G-BF2GVL8JLM"
};
// ────────────────────────────────────────────────────

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Already logged in → go straight to tree
onAuthStateChanged(auth, user => {
  if (user) window.location.href = 'tree.html';
});

window.doLogin = async () => {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('login-btn');
  const errEl    = document.getElementById('error-msg');

  errEl.classList.remove('show');
  if (!email || !password) {
    showError('Please enter your email and password.');
    return;
  }

  btn.classList.add('loading');
  btn.innerHTML = '<span class="spinner"></span> Signing in…';

  try {
    await signInWithEmailAndPassword(auth, email, password);
    // onAuthStateChanged will redirect
  } catch (e) {
    btn.classList.remove('loading');
    btn.textContent = 'Sign In';
    const msgs = {
      'auth/user-not-found':   'No account found with that email.',
      'auth/wrong-password':   'Wrong password. Please try again.',
      'auth/invalid-email':    'Please enter a valid email address.',
      'auth/too-many-requests':'Too many attempts. Please wait a moment.',
      'auth/invalid-credential': 'Email or password is incorrect.',
    };
    showError(msgs[e.code] || 'Login failed: ' + e.message);
  }
};

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.add('show');
}

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') window.doLogin();
});
</script>

<script>
// Generate twinkling stars
const starsEl = document.getElementById('stars');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() * 2 + 1;
  s.style.cssText = `
    width:${size}px; height:${size}px;
    top:${Math.random()*100}%; left:${Math.random()*100}%;
    --d:${3+Math.random()*5}s; --o:${0.3+Math.random()*0.5};
    animation-delay:-${Math.random()*6}s;
  `;
  starsEl.appendChild(s);
}
</script>
</body>
</html>
